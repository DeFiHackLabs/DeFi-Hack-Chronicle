name: Validate Schema

on:
  pull_request:
    paths:
      - 'public/data/hacks/**.json'
      - 'public/data/schema.json'
  push:
    paths:
      - 'public/data/hacks/**.json'
      - 'public/data/schema.json'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate hack JSONs against schema
        run: node scripts/validate-schema.mjs
